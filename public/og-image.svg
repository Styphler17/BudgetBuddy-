<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
    <!-- Background Gradient -->
    <defs>
        <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#10237f;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#020617;stop-opacity:1" />
        </linearGradient>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="20" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
    </defs>
    
    <rect width="1200" height="630" fill="url(#bg-grad)" />
    
    <!-- Decorative Orbs -->
    <circle cx="1000" cy="100" r="200" fill="#a2db21" opacity="0.05" />
    <circle cx="100" cy="500" r="150" fill="#10237f" opacity="0.1" />
    
    <!-- Logo Placeholder Area -->
    <g transform="translate(100, 165)">
        <rect width="300" height="300" rx="60" fill="white" opacity="0.05" />
        <!-- Simplified Logo -->
        <circle cx="150" cy="150" r="120" fill="none" stroke="#a2db21" stroke-width="20" opacity="0.8" />
        <path d="M100 150 L140 200 L210 110" stroke="#a2db21" stroke-width="25" fill="none" stroke-linecap="round" stroke-linejoin="round" />
    </g>
    
    <!-- Text Content -->
    <g transform="translate(450, 280)">
        <text font-family="Arial, sans-serif" font-weight="900" font-size="100" fill="#ffffff">BudgetBuddy</text>
        <text font-family="Arial, sans-serif" font-weight="500" font-size="40" fill="#a2db21" x="5" y="70">Smart Financial Planning &amp; Tracking</text>
        
        <!-- Tagline/Features -->
        <g transform="translate(0, 150)">
            <rect width="180" height="40" rx="20" fill="#ffffff" opacity="0.1" />
            <text font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#ffffff" x="90" y="26" text-anchor="middle">TRANSFORM</text>
            
            <rect width="180" height="40" rx="20" fill="#ffffff" opacity="0.1" x="200" />
            <text font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#ffffff" x="290" y="26" text-anchor="middle">TRACK</text>
            
            <rect width="180" height="40" rx="20" fill="#ffffff" opacity="0.1" x="400" />
            <text font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#ffffff" x="490" y="26" text-anchor="middle">THRIVE</text>
        </g>
    </g>
    
    <!-- Footer Border -->
    <rect x="0" y="620" width="1200" height="10" fill="#a2db21" />
</svg>